name: Anomalib Studio UI checks
permissions: {} # No permissions by default on workflow level

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "application/**"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch: # run on request (no need for PR)

jobs:
  check-paths:
    name: Check if workflow should run
    runs-on: ubuntu-latest
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    permissions:
      contents: read
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: open-edge-platform/geti-ci/actions/check-paths@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          files_yaml: |
            test:
              - application/**
              - .github/workflows/anomalib-studio.yaml

  generate-openapi-spec:
    name: Generate OpenAPI Spec
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      # uv caching: fork PRs blocked to mitigate cache poisoning, same-repo PRs allowed
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.9.18"
          enable-cache: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

      - name: Install OpenCV dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Prepare venv and install Python dependencies
        working-directory: application/backend
        run: |
          uv lock --check
          uv sync --frozen --extra cpu --extra mqtt

      - name: Get OpenAPI spec
        working-directory: application/backend
        run: |
          export PYTHONPATH=.
          uv run src/cli.py gen-api --target-path openapi-spec.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openapi-spec
          path: application/backend/openapi-spec.json

  python-checks:
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      # uv caching: fork PRs blocked to mitigate cache poisoning, same-repo PRs allowed
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.9.18"
          enable-cache: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

      - name: Prepare venv and install Python dependencies
        working-directory: application/backend
        run: |
          uv lock --check
          uv sync --frozen --extra cpu --extra mqtt

      - name: Check formatting with ruff
        working-directory: application/backend
        run: |
          uv run --with ruff ruff check --output-format=github .
          uv run --with ruff ruff format --check .

      - name: Check source code with mypy
        working-directory: application/backend
        run: |
          uv run --group lint mypy . --config-file=pyproject.toml

      - name: Run unit tests
        working-directory: application/backend
        run: |
          uv run pytest tests/unit

  ui-build:
    name: Build UI
    needs:
      - check-paths
      - generate-openapi-spec
    if: needs.check-paths.outputs.run_workflow == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
          persist-credentials: false

      # npm caching: fork PRs blocked to mitigate cache poisoning, same-repo PRs allowed
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version-file: application/ui/.nvmrc
          cache: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'npm' || '' }}
          cache-dependency-path: application/ui/package-lock.json

      - name: Install dependencies
        working-directory: "application/ui"
        run: npm ci

      - name: Download OpenAPI spec artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openapi-spec
          path: application/ui/src/api

      - name: Build UI
        working-directory: "application/ui"
        run: npm run build

      - name: Compress build
        working-directory: "application/ui"
        run: tar -czf dist.tar.gz dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-dist
          path: "application/ui/dist.tar.gz"

  ui-lint:
    name: Eslint checks
    needs:
      - check-paths
      - generate-openapi-spec
    if: needs.check-paths.outputs.run_workflow == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
          persist-credentials: false

      # npm caching: fork PRs blocked to mitigate cache poisoning, same-repo PRs allowed
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version-file: application/ui/.nvmrc
          cache: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'npm' || '' }}
          cache-dependency-path: application/ui/package-lock.json

      - name: Install dependencies
        working-directory: "application/ui"
        run: npm ci

      - name: Download OpenAPI spec artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openapi-spec
          path: application/ui/src/api

      - name: Build OpenAPI type definitions
        working-directory: "application/ui"
        run: npm run build:api:types

      - name: Prettier
        working-directory: "application/ui"
        run: npm run format:check

      - name: Eslint
        working-directory: "application/ui"
        run: npm run lint

      - name: Eslint cyclic imports
        working-directory: "application/ui"
        run: npm run cyclic-deps-check

      - name: Typescript
        working-directory: "application/ui"
        run: npm run type-check

  ui-unit-tests:
    name: Unit tests
    needs:
      - check-paths
      - generate-openapi-spec
    if: needs.check-paths.outputs.run_workflow == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
          persist-credentials: false

      # npm caching: fork PRs blocked to mitigate cache poisoning, same-repo PRs allowed
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version-file: application/ui/.nvmrc
          cache: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'npm' || '' }}
          cache-dependency-path: application/ui/package-lock.json

      - name: Install dependencies
        working-directory: "application/ui"
        run: npm ci

      - name: Download OpenAPI spec artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openapi-spec
          path: application/ui/src/api

      - name: Build OpenAPI type definitions
        working-directory: "application/ui"
        run: npm run build:api:types

      - name: UI Unit tests
        working-directory: "application/ui"
        run: npm run test:unit

  ui-playwright-tests:
    name: Playwright Tests
    needs:
      - check-paths
      - ui-build
      - generate-openapi-spec
    if: needs.check-paths.outputs.run_workflow == 'true'
    permissions:
      contents: read # to checkout code
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy@sha256:6aca677c27a967caf7673d108ac67ffaf8fed134f27e17b27a05464ca0ace831
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Install git lfs
        run: apt-get update && apt-get install git-lfs

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
          persist-credentials: false

      # npm caching: fork PRs blocked to mitigate cache poisoning, same-repo PRs allowed
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version-file: application/ui/.nvmrc
          cache: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'npm' || '' }}
          cache-dependency-path: application/ui/package-lock.json

      - name: Install dependencies
        working-directory: "application/ui"
        run: npm ci

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ui-dist
          path: "application/ui"

      - name: Unpack build
        working-directory: "application/ui"
        run: tar -xzf dist.tar.gz

      - name: Download OpenAPI spec artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openapi-spec
          path: application/ui/src/api

      - name: Build OpenAPI type definitions
        working-directory: "application/ui"
        run: npm run build:api:types

      - name: Run Playwright tests
        working-directory: "application/ui"
        run: npm run test:component -- --project "Component tests"

      - name: Upload blob report to GitHub Actions Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: application/ui/playwright-report/
          retention-days: 30

  required-check:
    name: Required Check anomalib-studio
    needs:
      - check-paths
      - generate-openapi-spec
      - python-checks
      - ui-build
      - ui-lint
      - ui-unit-tests
      - ui-playwright-tests
    runs-on: ubuntu-latest
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
