name: "AGENTS.md Sync (OpenCode)"

on:
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 8:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "opencode-agents-md-sync"
  cancel-in-progress: true

jobs:
  agents-md-sync:
    runs-on: self-hosted
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Skip if open agents-md-sync PR exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_PRS=$(gh pr list --label "agents-md-sync" --state open --json number --jq 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "::notice::Open agents-md-sync PR already exists. Skipping."
            exit 0
          fi

      - uses: ./.github/actions/ollama-preflight

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run agents-md-sync agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENCODE_PERMISSION: '{"read":"allow","glob":"allow","grep":"allow","edit":{"*":"deny","AGENTS.md":"allow"},"bash":{"*":"deny","git *":"allow","gh pr *":"allow","gh api *":"allow","gh search *":"allow","ls *":"allow","cat *":"allow","find *":"allow","date *":"allow","head *":"allow","tail *":"allow","grep *":"allow","wc *":"allow"}}'
          OPENCODE_CONFIG: .github/opencode.json
        run: |
          opencode run --pure -m ollama/gemma4:31b --agent agents-md-sync \
            "Run the AGENTS.md maintenance process. Check for structural codebase changes and update AGENTS.md if needed."
