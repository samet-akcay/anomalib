# Release Workflow
#
# This workflow manages the production release process.
#
# Key Features:
# - Version validation
# - Comprehensive testing
# - Security scanning
# - Production release
# - Manual and automated triggers
#
# Process Stages:
# 1. Validation:
#    - Version format check
#    - Code quality verification
#    - Test suite execution
#    - Security assessment
#    - Package build and verification
#
# 2. Publish:
#    - Environment approval gate (production)
#    - Production PyPI deployment (OIDC)
#    - GitHub release creation
#
# Required Secrets:
# - CODECOV_TOKEN: Coverage reporting
#
# Note: PyPI publishing uses OIDC (OpenID Connect) authentication.
# Configure trusted publishers in PyPI project settings:
# - For production releases (PyPI):
#   - Owner: <your-org>
#   - Repository name: anomalib
#   - Workflow name: release-lib.yaml
#   - Environment name: production

name: Release Library

on:
  push:
    tags:
      - "lib/v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., lib/v1.2.3)"
        required: true
        type: string
      dry_run:
        description: "Perform a dry run without creating a release"
        required: false
        type: boolean
        default: false

permissions: {} # No permissions by default on workflow level

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate-version.outputs.version }}
    permissions:
      contents: read # Required to checkout the repository for version validation
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          sparse-checkout: src/anomalib/__init__.py
      - name: Validate version
        id: validate-version
        env:
          INPUTS_VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
        run: |
          VERSION="${INPUTS_VERSION#lib/}"

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $INPUTS_VERSION"
            exit 1
          fi

          TAG_VERSION="${VERSION#v}"
          PKG_VERSION=$(sed -n "s/^[[:space:]]*__version__[[:space:]]*=[[:space:]]*[\"']\([^\"']*\)[\"']/\1/p" src/anomalib/__init__.py)
          if [[ -z "$PKG_VERSION" ]]; then
            echo "::error::Could not extract __version__ from src/anomalib/__init__.py"
            exit 1
          fi
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match __version__ in src/anomalib/__init__.py ($PKG_VERSION)"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

  quality:
    needs: [version-check]
    uses: ./.github/workflows/_reusable-code-quality.yaml
    permissions:
      contents: read # Required by the called workflow to checkout the repository
    with:
      python-version: "3.10"

  unit-tests:
    needs: [version-check]
    uses: ./.github/workflows/_reusable-test-suite.yaml
    permissions:
      contents: read # Required by the called workflow to checkout the repository
    with:
      python-version: "3.10"
      test-type: "unit"
      runner: "ubuntu-latest"
      timeout: 30
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    needs: [version-check]
    uses: ./.github/workflows/_reusable-test-suite.yaml
    permissions:
      contents: read # Required by the called workflow to checkout the repository
    with:
      python-version: "3.10"
      test-type: "integration"
      runner: "self-hosted"
      timeout: 60
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  security:
    needs: [version-check]
    uses: ./.github/workflows/_reusable-security-scan.yaml
    permissions:
      security-events: write # Required to upload SARIF scan results to the Security tab
      packages: read
      contents: read
    with:
      tools: "bandit,semgrep,trivy,zizmor"
      scan-scope: "all"
      severity-level: "HIGH"
      fail-on-findings: false

  build:
    needs: [version-check, quality, unit-tests, integration-tests, security]
    if: |
      !inputs.dry_run &&
      !failure() && !cancelled()
    uses: ./.github/workflows/_reusable-artifact-builder.yaml
    permissions:
      contents: read # Required by the called workflow to checkout the repository
    with:
      python-version: "3.10"
      verify-package: true

  publish:
    needs: [version-check, build]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write # Required by softprops/action-gh-release to publish release
      id-token: write # Required for OIDC authentication with PyPI
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 # zizmor: ignore[superfluous-actions]
        with:
          tag_name: lib/${{ needs.version-check.outputs.version }}
          name: Release Anomalib Library ${{ needs.version-check.outputs.version }}
          draft: false
          prerelease: false
          files: dist/*
          generate_release_notes: true

  status:
    needs: [version-check, publish]
    if: always() && !inputs.dry_run
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Verify workflow status
        env:
          RELEASE_VERSION: lib/${{ needs.version-check.outputs.version }}
          PUBLISH_STATUS: ${{ needs.publish.result }}
        run: |
          if [[ "$PUBLISH_STATUS" != "success" ]]; then
            echo "::error::Release workflow failed with status: $PUBLISH_STATUS"
            exit 1
          fi

          echo "Production release $RELEASE_VERSION completed successfully"
